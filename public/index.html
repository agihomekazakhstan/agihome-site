<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Home - Atlant</title>
    <style>

        .objects-list { padding: 20px; display: grid; gap: 20px; }

        .cta-button { background: #25D366; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="ai-chat-header">
    <h2>Чат с AI-брокером Gemini</h2>
    <p>Спросите меня о ЖК Atlant, ипотеке или доходности</p>
    </div>

<div class="objects-list">
    <h3>Доступные объекты в ЖК Atlant</h3>
    <div class="card">
        <h4>1-комнатная квартира, 42 м²</h4>
        <p>Цена: от 28 000 000 ₸</p>
        <a href="https://wa.me/7XXXXXXXXXX?text=Меня%20интересует%201-комнатная%20в%20Atlant" class="cta-button">Записаться на просмотр</a>
    </div>
    </div>

</body>
</html>
